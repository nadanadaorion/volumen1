<!DOCTYPE html>
<!--
  ============================================================================
  PORTAFOLIO · REVISTA INTERACTIVA 3D (Three.js)
  ============================================================================
  Estructura del proyecto:
    /index.html            este archivo (el VISOR 3D)
    /lib/three.min.js      motor 3D Three.js r160 (no editar)
    /pages/                imágenes de las páginas (A4, 1191x1684)
    /media/                videos, audios, imágenes y carátula de audio
    /portafolio.json       contenido (páginas, hotspots, fondo) — lo genera editor.html

  MODELO DE HOJAS:
    Cada HOJA física de la revista tiene dos caras:
      pages[0] = frente hoja 0 (portada)     pages[1] = dorso hoja 0
      pages[2] = frente hoja 1               pages[3] = dorso hoja 1  …
    El número de páginas debería ser PAR; si es impar, la última hoja
    tendrá el dorso en blanco.

  CÓMO CAMBIAR EL LOOK DE LOS REPRODUCTORES:
    Edita únicamente los TOKENS DE TEMA en el bloque :root (más abajo).

  CÓMO CAMBIAR EL CONTENIDO (páginas, medios, hotspots):
    Usa editor.html (genera portafolio.json). Los hotspots se definen en
    porcentaje sobre cada página, igual que en la versión anterior.
  ============================================================================
-->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.png" type="image/png">
<title>Ori♡n - Visual</title>
<style>
  /* =====================================================================
     TOKENS DE TEMA  ·  Edita SOLO esta sección para cambiar la apariencia.
  ===================================================================== */
  :root{
    --bg:#15151c;
    --accent:#e6c878;

    /* ---------- REPRODUCTOR (audio / video / imagen) ---------- */
    --pl-width: 430px;
    --pl-radius: 12px;
    --pl-bg: linear-gradient(#ffffff,#eef1f5);
    --pl-border: 1px solid #c8ccd4;
    --pl-shadow: 0 22px 60px rgba(0,0,0,.45);
    --pl-font: system-ui, sans-serif;

    --pl-topbar-bg: linear-gradient(#fdfdfd,#e9edf2);
    --pl-topbar-border: #d6dae1;
    --pl-topbar-color: #333;
    --pl-accent-blue: #2aa3ef;

    --pl-art-size: 150px;
    --pl-art-bg: #000;
    --pl-art-radius: 4px;

    --pl-title-size: 20px;
    --pl-title-color: #111;
    --pl-sub-size: 15px;
    --pl-sub-color: #888;

    --pl-track-bg: #d7dbe2;
    --pl-fill: linear-gradient(#5cc3ff,#1c95e8);
    --pl-thumb-bg: radial-gradient(circle at 35% 30%,#fff,#bcc3cc);
    --pl-thumb-border: #8a929d;
    --pl-time-color: #555;
    --pl-time-color-rem: #999;

    --pl-controls-bg: linear-gradient(#f6f8fb,#e9edf2);
    --pl-controls-border: #e2e5ea;
    --pl-btn-bg: linear-gradient(#ffffff,#dfe5ec);
    --pl-btn-bg-hover: linear-gradient(#ffffff,#eaf0f7);
    --pl-btn-bg-active: linear-gradient(#dfe5ec,#cfd6df);
    --pl-btn-border: #c2c8d0;
    --pl-btn-color: #33597a;
    --pl-vol-accent: #1c95e8;

    --pl-imgcanvas-bg: #111;
    --pl-imgcanvas-h: 360px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background: radial-gradient(circle at 50% 30%, #25252f, var(--bg));
    font-family:system-ui,sans-serif;
    overflow:hidden;
  }
  /* lienzo 3D a pantalla completa; el fondo del body se ve a través (alpha) */
  #contenedor{ position:fixed; inset:0; width:100%; height:100%; display:block; touch-action:none; }

  /* ===================================================
     REPRODUCTOR estilo iPod / "Now Playing"
  =================================================== */
  .ipod{
    position:fixed; z-index:1000; display:none;
    width:var(--pl-width);
    background:var(--pl-bg);
    border-radius:var(--pl-radius); overflow:hidden;
    border:var(--pl-border);
    box-shadow:var(--pl-shadow);
    font-family:var(--pl-font);
  }
  .ipod.open{ display:block; }
  .ipod .screen{ background:transparent; }

  .ipod .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:9px 12px; font-size:13px; font-weight:600; color:var(--pl-topbar-color);
    background:var(--pl-topbar-bg);
    border-bottom:1px solid var(--pl-topbar-border); cursor:move; user-select:none;
  }
  .ipod .topbar .status{ display:flex; align-items:center; gap:6px; }
  .ipod .topbar .playicon{ color:var(--pl-accent-blue); }
  .ipod .topbar .batt{
    width:26px; height:13px; border:1px solid #2a8f3a; border-radius:2px;
    background:linear-gradient(#7be58c,#3fbf57); position:relative;
  }
  .ipod .topbar .batt::after{ content:""; position:absolute; right:-4px; top:3px; width:3px; height:7px; background:#2a8f3a; border-radius:0 1px 1px 0; }
  .ipod .closex{
    border:none; background:none; cursor:pointer; font-size:15px; color:#999;
    line-height:1; padding:0 2px;
  }
  .ipod .closex:hover{ color:#333; }

  .ipod .nowbody{ display:flex; gap:16px; padding:18px; align-items:center; }
  .ipod .art{
    width:var(--pl-art-size); height:var(--pl-art-size); flex:none; background:var(--pl-art-bg);
    border-radius:var(--pl-art-radius); overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.25);
    display:flex; align-items:center; justify-content:center;
  }
  .ipod .art img, .ipod .art video{ width:100%; height:100%; object-fit:cover; display:block; }
  .ipod.video .art video{ object-fit:contain; background:#000; }
  .ipod .info{ flex:1; min-width:0; }
  .ipod .info .ttl{ font-size:var(--pl-title-size); font-weight:700; color:var(--pl-title-color); line-height:1.2; }
  .ipod .info .sub{ font-size:var(--pl-sub-size); color:var(--pl-sub-color); margin-top:6px; }

  .ipod.video .nowbody{ flex-direction:column; gap:10px; padding:16px; align-items:stretch; }
  .ipod.video .art{ width:100%; height:auto; aspect-ratio:16/9; max-height:70vh; }
  .ipod.video .info{ text-align:center; }
  .ipod.video .info .ttl{ font-size:17px; }
  .ipod.video .info .sub{ font-size:13px; margin-top:2px; }

  .ipod .seekrow{
    display:flex; align-items:center; gap:10px;
    padding:6px 18px 10px; font-size:12px; color:var(--pl-time-color);
    font-variant-numeric:tabular-nums;
  }
  .ipod .seekrow input[type=range]{
    -webkit-appearance:none; appearance:none; flex:1; height:7px;
    border-radius:4px; background:transparent; outline:none; cursor:pointer;
    touch-action:none;
    position:relative; z-index:3;
  }
  .ipod .seekrow input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:15px; height:15px; border-radius:50%;
    background:var(--pl-thumb-bg);
    border:1px solid var(--pl-thumb-border); box-shadow:0 1px 2px rgba(0,0,0,.3);
  }
  .ipod .seekrow input[type=range]::-moz-range-thumb{
    width:15px;height:15px;border-radius:50%;background:#fff;border:1px solid var(--pl-thumb-border);
  }
  .ipod .seekrow .barwrap{ flex:1; position:relative; height:7px; }
  .ipod .seekrow .barwrap .track{ position:absolute; inset:0; border-radius:4px; background:var(--pl-track-bg); pointer-events:none; }
  .ipod .seekrow .barwrap input{ position:absolute; inset:0; width:100%; z-index:4; }
  .ipod .seekrow .fill{ position:absolute; left:0; top:0; height:7px; border-radius:4px;
    background:var(--pl-fill); pointer-events:none; width:0%; }
  .ipod .timeR{ color:var(--pl-time-color-rem); }

  .ipod .controls{
    display:flex; align-items:center; justify-content:center; gap:12px;
    padding:10px 16px 16px;
    border-top:1px solid var(--pl-controls-border);
    background:var(--pl-controls-bg);
  }
  .ipod .controls button{
    width:46px;height:32px;border-radius:8px;border:1px solid var(--pl-btn-border);
    background:var(--pl-btn-bg); color:var(--pl-btn-color); cursor:pointer; font-size:14px;
    box-shadow:0 1px 1px rgba(0,0,0,.08), inset 0 1px 0 #fff;
  }
  .ipod .controls button:hover{ background:var(--pl-btn-bg-hover); }
  .ipod .controls button:active{ background:var(--pl-btn-bg-active); }
  .ipod .controls .vol{ display:flex; align-items:center; gap:6px; color:#667; font-size:13px; margin-left:4px; }
  .ipod .controls .vol input{ width:78px; accent-color:var(--pl-vol-accent); }

  .ipod.image .nowbody{ padding:0; }
  .ipod.image .imgcanvas{
    width:100%; height:var(--pl-imgcanvas-h); background:var(--pl-imgcanvas-bg); overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  .ipod.image .imgcanvas img{ transform-origin:center; transition:transform .12s ease-out; max-width:100%; max-height:100%; will-change:transform; }
  .ipod.image .imgcanvas img:active{ transition:none; }

  /* ============ RESPONSIVE (móvil) ============ */
  @media (max-width: 820px){
    .ipod{
      width: calc(100vw - 24px) !important;
      max-width: 460px;
      left: 50% !important;
      top: 12px !important;
      transform: translateX(-50%);
    }
    .ipod .nowbody{ padding:14px; gap:12px; }
    .ipod .art{ width:110px; height:110px; }
    .ipod .info .ttl{ font-size:17px; }
    .ipod .info .sub{ font-size:13px; }
    .ipod.image .imgcanvas{ height:46vh; }
    .ipod .topbar{ cursor:default; }
    .ipod .controls{ flex-wrap:wrap; gap:10px; }
    .ipod .seekrow{ padding-top:12px; padding-bottom:14px; }
    .ipod .seekrow .barwrap{ height:24px; display:flex; align-items:center; }
    .ipod .seekrow input[type=range]{ height:24px; }
    .ipod .seekrow input[type=range]::-webkit-slider-thumb{ width:22px; height:22px; }
    .ipod .seekrow input[type=range]::-moz-range-thumb{ width:22px; height:22px; }
    .ipod .seekrow .barwrap .track,
    .ipod .seekrow .fill{ top:50%; transform:translateY(-50%); }
  }
</style>
</head>
<body>
  <canvas id="contenedor"></canvas>

  <div id="seekdbg" style="display:none;position:fixed;left:0;right:0;bottom:0;max-height:32vh;overflow:auto;background:rgba(10,10,16,.92);color:#7CFC9A;font:11px/1.3 monospace;padding:6px 9px;z-index:99998;border-top:2px solid #2aa3ef"></div>
  <script>
  window.__SDBG = (location.search.indexOf('debug=1')>=0);
  window.slog=function(m){ if(!window.__SDBG)return; var b=document.getElementById('seekdbg'); b.style.display='block'; var l=document.createElement('div'); l.textContent='• '+m; b.insertBefore(l,b.firstChild); while(b.childNodes.length>30)b.removeChild(b.lastChild); };
  </script>

  <div id="errbox" style="display:none;position:fixed;inset:0;background:#1a1a22;color:#e6c878;font-family:monospace;padding:30px;z-index:99999;overflow:auto;white-space:pre-wrap;font-size:14px"></div>
  <script>
  window.onerror=function(m,s,l,c,e){var b=document.getElementById('errbox');b.style.display='block';b.textContent='⚠ ERROR\n\n'+m+'\n'+s+'  L'+l+':'+c+'\n\n'+(e&&e.stack?e.stack:'');return false;};
  </script>
  <script src="/lib/three.min.js"></script>

  <!-- ===== Reproductor audio/video (iPod) ===== -->
  <div class="ipod" id="player">
    <div class="screen">
      <div class="topbar" id="playerBar">
        <span class="status"><span class="playicon">▶</span> Now Playing</span>
        <span style="display:flex;align-items:center;gap:8px">
          <span class="batt"></span>
          <button class="closex" data-close="player">✕</button>
        </span>
      </div>
      <div class="nowbody">
        <div class="art" id="playerArt"></div>
        <div class="info">
          <div class="ttl" id="playerTitle">—</div>
          <div class="sub" id="playerSub"></div>
        </div>
      </div>
      <div class="seekrow">
        <span id="timeCur">0:00</span>
        <div class="barwrap">
          <div class="track"></div>
          <div class="fill" id="seekFill"></div>
          <input type="range" id="seek" min="0" max="100" step="0.1" value="0">
        </div>
        <span class="timeR" id="timeDur">-0:00</span>
      </div>
    </div>
    <div class="controls">
      <button id="btnPlay">▶</button>
      <button id="btnPause">⏸</button>
      <button id="btnStop">⏹</button>
      <span class="vol">🔊<input type="range" id="vol" min="0" max="1" step="0.01" value="1"></span>
    </div>
  </div>

  <!-- ===== Visor de imagen (iPod) ===== -->
  <div class="ipod image" id="viewer">
    <div class="screen">
      <div class="topbar" id="viewerBar">
        <span class="status">🖼 <span id="viewerTitle">Imagen</span></span>
        <span style="display:flex;align-items:center;gap:8px">
          <span class="batt"></span>
          <button class="closex" data-close="viewer">✕</button>
        </span>
      </div>
      <div class="nowbody">
        <div class="imgcanvas"><img id="imgEl" src="" alt=""></div>
      </div>
      <div class="seekrow" id="viewerSub" style="justify-content:center;color:#888"></div>
    </div>
    <div class="controls">
      <button id="zoomOut">−</button>
      <button id="zoomReset">⟳</button>
      <button id="zoomIn">+</button>
      <span style="color:#bbb;font-size:12px" id="zoomLabel">100%</span>
    </div>
  </div>

  <script>
  /* =========================================================
     El CONTENIDO se carga desde portafolio.json (generado por editor.html).
     Si el JSON no se encuentra, se usa el contenido de respaldo de abajo.
  ========================================================= */
  const FALLBACK_DATA = {
    audioCover: "media/audio_cover.jpg",
    pages: [
      { src:"pages/portada.jpg", hotspots:[] },
      { src:"pages/p2.jpg", hotspots:[] },
      { src:"pages/p3.jpg", hotspots:[] },
      { src:"pages/contraportada.jpg", hotspots:[] }
    ]
  };

  let DATA = FALLBACK_DATA;

  // Carga portafolio.json y arranca. Si falla, usa el respaldo.
  // Si viene de la vista previa del editor (?preview=1), usa sessionStorage.
  function boot(){
    if(location.search.indexOf('preview=1')>=0){
      try{
        const pv=sessionStorage.getItem('previewData');
        if(pv){ DATA=JSON.parse(pv); start(); return; }
      }catch(e){}
    }
    // Busca el JSON junto al index.html actual (/, /musica/, /visual/…)
    const jsonUrl = new URL('portafolio.json', window.location.href);
    fetch(jsonUrl.href, {cache:'no-store'})
      .then(r=>{ if(!r.ok) throw new Error('sin json: '+jsonUrl.pathname); return r.json(); })
      .then(json=>{ DATA = json; start(); })
      .catch(()=>{ DATA = FALLBACK_DATA; start(); });
  }

  function start(){
   try {
    if(typeof THREE==='undefined'){ const b=document.getElementById('errbox'); b.style.display='block'; b.textContent='La librería three.js no se cargó.'; return; }

    /* ---------- Fondo personalizable: color o imagen ---------- */
    if(DATA.background){
      const bg=DATA.background;
      if(bg.tipo==='imagen' && bg.valor){
        document.body.style.background='#15151c url("'+bg.valor+'") center/cover no-repeat';
      } else if(bg.tipo==='color' && bg.valor){
        document.body.style.background=bg.valor;
      }
    }

    const isMobile = window.matchMedia('(max-width: 820px)').matches;

    /* ============================================================
       CONFIGURACIÓN 3D
    ============================================================ */
    // Proporción de página A4 (igual que los archivos de /pages: 1191x1684)
    const IMG_W = 1191, IMG_H = 1684;
    const ALTO_PAGINA = 5;
    const ANCHO_PAGINA = ALTO_PAGINA * (IMG_W/IMG_H);
    const SEGMENTOS = isMobile ? 80 : 160;
    const DURACION = 1400;

    /* ---------- Escena, cámara, render ---------- */
    const canvas = document.getElementById('contenedor');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.shadowMap.enabled = false;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
    camera.position.set(0, 0.4, 13);
    camera.lookAt(0, 0, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 2.2));
    const luz = new THREE.DirectionalLight(0xffffff, 1.45);
    luz.position.set(-3.5, 15, 9);
    luz.shadow.mapSize.set(2048,2048);
    luz.shadow.radius = 7;
    luz.shadow.camera.near=1; luz.shadow.camera.far=40;
    luz.shadow.camera.left=-10; luz.shadow.camera.right=10;
    luz.shadow.camera.top=10; luz.shadow.camera.bottom=-10;
    scene.add(luz);

    /* ---------- Cámara: encuadre + zoom ---------- */
    let fitDist = 13;      // distancia a la que el libro abierto cabe en pantalla
    let zoomF = 1;         // 1 = encuadre completo; <1 = acercado
    let camPanX = 0, camPanY = 0;
    const ZMIN = 0.3;
    function aplicarCamara(){
      const lim = (1 - zoomF) * ANCHO_PAGINA * 2;
      camPanX = Math.max(-lim, Math.min(lim, camPanX));
      camPanY = Math.max(-lim, Math.min(lim, camPanY));
      if(zoomF>=1){ camPanX=0; camPanY=0; }
      camera.position.x = camPanX;
      camera.position.y = 0.4 + camPanY;
      camera.position.z = fitDist * zoomF;
    }
    function ajustar(){
      const w=innerWidth, h=innerHeight;
      renderer.setSize(w,h,false);
      camera.aspect=w/h; camera.updateProjectionMatrix();
      const fov = camera.fov*Math.PI/180;
      const margen = 1.12;
      const distAlto  = (ALTO_PAGINA/2*margen)/Math.tan(fov/2);
      const distAncho = (ANCHO_PAGINA*margen)/(Math.tan(fov/2)*camera.aspect);
      fitDist = Math.max(distAlto, distAncho);
      aplicarCamara();
    }
    addEventListener('resize', ajustar); ajustar();

    /* ---------- Texturas ---------- */
    const loader = new THREE.TextureLoader();
    function texturaLisa(color){
      const c=document.createElement('canvas'); c.width=8; c.height=8;
      const g=c.getContext('2d'); g.fillStyle=color; g.fillRect(0,0,8,8);
      const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;
    }
    function cargarTextura(url){
      return new Promise((res)=>{
        if(!url){ res(texturaLisa('#f4f2ee')); return; }
        loader.load(url,
          (t)=>{ t.colorSpace=THREE.SRGBColorSpace; t.anisotropy=8; res(t); },
          undefined,
          ()=>{ // sustituto si falla la carga
            const c=document.createElement('canvas'); c.width=620; c.height=877;
            const g=c.getContext('2d'); g.fillStyle='#bdbdbd'; g.fillRect(0,0,c.width,c.height);
            g.fillStyle='#555'; g.font='24px system-ui'; g.fillText(url,20,50);
            const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; res(t);
          });
      });
    }

    /* ============================================================
       HOJA FÍSICA
       Geometría anclada en el lomo (x=0) extendiéndose a x=+ANCHO.
       rotation efectiva 0 -> hoja a la DERECHA (vemos su FRENTE).
       rotation efectiva PI -> hoja a la IZQUIERDA (vemos su DORSO).
    ============================================================ */
    class Hoja {
      constructor(texFrente, texDorso){
        const geo = new THREE.PlaneGeometry(ANCHO_PAGINA, ALTO_PAGINA, SEGMENTOS, SEGMENTOS);
        geo.translate(ANCHO_PAGINA/2, 0, 0);   // pivote en el lomo
        this.baseX = []; this.baseY = [];
        const pos = geo.attributes.position;
        for (let i=0;i<pos.count;i++){ this.baseX.push(pos.getX(i)); this.baseY.push(pos.getY(i)); }

        // El dorso se ve "desde atrás" de la malla: invertimos la U de su
        // textura para que el contenido se lea al derecho.
        texDorso.wrapS = THREE.RepeatWrapping;
        texDorso.repeat.x = -1;
        texDorso.offset.x = 1;
        // Acabado plastificado de revista: clearcoat = barniz satinado.
        const matF = new THREE.MeshPhysicalMaterial({
          map:texFrente, roughness:.38, metalness:0,
          clearcoat:.85, clearcoatRoughness:.25, side:THREE.FrontSide });
        const matD = new THREE.MeshPhysicalMaterial({
          map:texDorso, roughness:.38, metalness:0,
          clearcoat:.85, clearcoatRoughness:.25, side:THREE.BackSide });

        this.geo = geo;
        this.mF = new THREE.Mesh(geo, matF);
        this.mD = new THREE.Mesh(geo, matD);
        [this.mF,this.mD].forEach(m=>{ m.castShadow=true; m.receiveShadow=true; });

        this.grupo = new THREE.Group();
        this.grupo.add(this.mF); this.grupo.add(this.mD);
        this.angulo = 0;
        this.esPrimera = false;   // portada: sin canal cuando la revista está cerrada
        this.esUltima = false;    // contraportada: ídem
        this.deformar(0,0);
      }

      // Curvatura de reposo: canal que se hunde hacia el lomo.
      static zCanal(t){ return -0.55 * Math.pow(1 - t, 2.0); }

      // Intensidad del canal según el ángulo: la portada cerrada (ang=0) y la
      // contraportada cerrada (ang=PI) quedan PLANAS; el canal entra en rampa
      // durante el volteo para no dar saltos.
      factorCanal(ang){
        const t = Math.max(0, Math.min(1, ang/Math.PI));
        let c = 1;
        if (this.esPrimera) c *= t;
        if (this.esUltima)  c *= 1 - t;
        return c;
      }

      // Volteo completo: rota cada vértice alrededor del lomo.
      deformar(ang, curv){
        const pos = this.geo.attributes.position;
        const canal = this.factorCanal(ang);
        for (let i=0;i<pos.count;i++){
          const d = this.baseX[i];
          const t = d / ANCHO_PAGINA;
          const X = Math.cos(ang) * d;
          let Z = Math.sin(ang) * d;
          Z += Math.sin(t*Math.PI) * curv;
          Z += Hoja.zCanal(t) * canal;
          pos.setX(i, X);
          pos.setY(i, this.baseY[i]);
          pos.setZ(i, Z);
        }
        pos.needsUpdate = true;
        this.geo.computeVertexNormals();
      }

      // Pliegue de ESQUINA con reflexión real (page peel).
      doblarEsquina(esquinaY, ox, oy, alza){
        const pos = this.geo.attributes.position;
        const halfH = ALTO_PAGINA/2;
        const ang = this.angulo;
        const lado = Math.cos(ang) >= 0 ? 1 : -1;
        const Cx = lado * ANCHO_PAGINA, Cy = esquinaY * halfH;
        let Tx = Cx + ox, Ty = Cy + oy;

        // Restricción física: la punta no puede alejarse del lomo más de lo
        // que mide la hoja (dos círculos de restricción).
        const S1x = 0, S1y = Cy;
        const S2x = 0, S2y = -Cy;
        const r1 = ANCHO_PAGINA;
        const r2 = Math.hypot(ANCHO_PAGINA, ALTO_PAGINA);
        for (let pasada = 0; pasada < 2; pasada++){
          let vx = Tx - S1x, vy = Ty - S1y, L = Math.hypot(vx, vy);
          if (L > r1){ Tx = S1x + vx*r1/L; Ty = S1y + vy*r1/L; }
          vx = Tx - S2x; vy = Ty - S2y; L = Math.hypot(vx, vy);
          if (L > r2){ Tx = S2x + vx*r2/L; Ty = S2y + vy*r2/L; }
        }

        const dx = Tx - Cx, dy = Ty - Cy;
        const dist = Math.hypot(dx, dy);
        if (dist < 0.01){ this.plano(); return; }

        const nx = dx / dist, ny = dy / dist;
        const Mx = (Cx + Tx) / 2, My = (Cy + Ty) / 2;
        const canal = this.factorCanal(ang);

        for (let i=0;i<pos.count;i++){
          const d = this.baseX[i];
          const y = this.baseY[i];
          const Xb = Math.cos(ang) * d;
          const s = (Xb - Mx)*nx + (y - My)*ny;
          const EPS = (ANCHO_PAGINA / SEGMENTOS) * 2;
          if (s < 0){
            const rampa = Math.min(1, -s / EPS);
            pos.setX(i, Xb - 2*s*nx);
            pos.setY(i, y  - 2*s*ny);
            pos.setZ(i, (alza + Math.min(0.15, -s*0.05)) * rampa);
          } else {
            pos.setX(i, Xb);
            pos.setY(i, y);
            pos.setZ(i, Hoja.zCanal(d / ANCHO_PAGINA) * canal);
          }
        }
        pos.needsUpdate = true;
        this.geo.computeVertexNormals();
      }

      plano(){ this.deformar(this.angulo, 0); }
    }

    /* ============================================================
       LIBRO: construcción, apilado y volteo
    ============================================================ */
    let hojas = [];
    let volteadas = 0;      // nº de hojas ya pasadas (0 = cerrada en portada)
    let animando = false;
    let mediaOpen = false;  // true mientras un reproductor/visor está abierto

    // Contenedor de todas las hojas: se desliza para centrar la hoja única
    // cuando la revista está cerrada (portada o contraportada).
    const libro = new THREE.Group();
    scene.add(libro);
    let offsetObjetivo = 0;
    function actualizarCentrado(){
      if (volteadas === 0)                offsetObjetivo = -ANCHO_PAGINA/2;
      else if (volteadas >= hojas.length) offsetObjetivo =  ANCHO_PAGINA/2;
      else                                offsetObjetivo = 0;
    }

    async function construir(){
      const tex = [];
      for (const p of DATA.pages) tex.push(await cargarTextura(p.src));
      if (tex.length % 2) tex.push(texturaLisa('#f4f2ee'));  // dorso en blanco si nº impar

      for (let i=0; i<tex.length; i+=2){
        const h = new Hoja(tex[i], tex[i+1]);
        libro.add(h.grupo);
        hojas.push(h);
      }
      if (hojas.length){
        hojas[0].esPrimera = true;
        hojas[hojas.length-1].esUltima = true;
      }
      reapilar();
      actualizarEstado();
      animar();
    }

    // Solo es visible el PLIEGO ACTIVO:
    //   izquierda = hoja (volteadas-1) mostrando su DORSO   (ángulo PI)
    //   derecha   = hoja (volteadas)   mostrando su FRENTE  (ángulo 0)
    function reapilar(exceptoIndice=-1){
      const izq = volteadas - 1;
      const der = volteadas;
      hojas.forEach((h, i)=>{
        if (i === exceptoIndice){ h.grupo.visible = true; return; }
        if (i === izq){
          h.angulo = Math.PI; h.deformar(Math.PI, 0);
          h.grupo.position.z = 0;
          h.grupo.visible = true;
        } else if (i === der){
          h.angulo = 0; h.deformar(0, 0);
          h.grupo.position.z = 0;
          h.grupo.visible = true;
        } else {
          h.grupo.visible = false;
        }
      });
    }

    function actualizarEstado(){
      actualizarCentrado();
    }

    function voltear(dir){
      if (animando) return;
      if (mediaOpen && isMobile) return;
      const idx = dir > 0 ? volteadas : volteadas - 1;
      const h = hojas[idx];
      if (!h) return;
      animando = true; actualizarEstado();
      prepararVuelo(dir);

      const desde = dir > 0 ? 0 : Math.PI;
      const hasta = dir > 0 ? Math.PI : 0;
      const t0 = performance.now();

      function paso(now){
        let p = Math.min((now - t0)/DURACION, 1);
        const e = p<0.5 ? 2*p*p : 1 - Math.pow(-2*p+2,2)/2;
        const ang = desde + (hasta - desde)*e;
        aplicarAngulo(h, ang);
        if (p < 1) requestAnimationFrame(paso);
        else {
          h.deformar(hasta, 0); h.angulo = hasta;
          h.grupo.position.z = 0;
          volteadas += dir;
          reapilar();
          animando = false;
          actualizarEstado();
        }
      }
      requestAnimationFrame(paso);
    }

    // Prepara la visibilidad de las hojas del pliego para un vuelo en dirección dir.
    function prepararVuelo(dir){
      ocultarResaltado();
      const volteadasDestino = volteadas + dir;
      hojas.forEach(x => x.grupo.visible = false);
      if (dir > 0){
        const der = hojas[volteadasDestino];
        if (der){ der.grupo.visible = true; der.deformar(0,0); der.angulo=0; der.grupo.position.z = 0; }
        const izqOrigen = hojas[volteadas - 1];
        if (izqOrigen){ izqOrigen.grupo.visible = true; izqOrigen.deformar(Math.PI,0); izqOrigen.angulo=Math.PI; izqOrigen.grupo.position.z = 0; }
      } else {
        const izq = hojas[volteadasDestino - 1];
        if (izq){ izq.grupo.visible = true; izq.deformar(Math.PI,0); izq.angulo=Math.PI; izq.grupo.position.z = 0; }
        const derOrigen = hojas[volteadas];
        if (derOrigen){ derOrigen.grupo.visible = true; derOrigen.deformar(0,0); derOrigen.angulo=0; derOrigen.grupo.position.z = 0; }
      }
      const idx = dir > 0 ? volteadas : volteadas - 1;
      const h = hojas[idx];
      if (h) h.grupo.visible = true;
    }

    // Aplica un ángulo intermedio a la hoja h con el bombeo proporcional.
    function aplicarAngulo(h, ang){
      const arco = Math.sin(ang);
      const curv = Math.abs(arco) * 0.4;
      h.deformar(ang, curv);
      h.angulo = ang;
      h.grupo.position.z = 0.04;
    }

    /* ============================================================
       HIT-TESTING: punto del cursor -> página y coordenadas %
    ============================================================ */
    const raycaster = new THREE.Raycaster();
    const mouseNDC = new THREE.Vector2();
    const planoRef = new THREE.Plane(new THREE.Vector3(0,0,1), 0); // plano z=0
    const puntoRef = new THREE.Vector3();

    function actualizarNDC(clientX, clientY){
      const r = canvas.getBoundingClientRect();
      mouseNDC.x = ((clientX - r.left) / r.width) * 2 - 1;
      mouseNDC.y = -((clientY - r.top) / r.height) * 2 + 1;
    }

    // Punto del cursor proyectado sobre el plano del libro (coords del libro).
    function puntoEnLibro(){
      raycaster.setFromCamera(mouseNDC, camera);
      if (!raycaster.ray.intersectPlane(planoRef, puntoRef)) return null;
      const x = puntoRef.x - libro.position.x, y = puntoRef.y;
      const halfH = ALTO_PAGINA/2;
      if (Math.abs(x) > ANCHO_PAGINA || Math.abs(y) > halfH) return null;
      return { x, y };
    }

    // Página visible bajo el punto y coordenadas en % de esa página.
    // Página derecha = DATA.pages[2*volteadas]; izquierda = DATA.pages[2*volteadas-1].
    function paginaBajoPunto(pt){
      let pageIdx, xpct;
      if (pt.x >= 0){
        if (volteadas >= hojas.length) return null;   // no hay página derecha
        pageIdx = 2*volteadas;
        xpct = pt.x / ANCHO_PAGINA * 100;
      } else {
        if (volteadas <= 0) return null;              // no hay página izquierda
        pageIdx = 2*volteadas - 1;
        xpct = (pt.x + ANCHO_PAGINA) / ANCHO_PAGINA * 100;
      }
      const ypct = (ALTO_PAGINA/2 - pt.y) / ALTO_PAGINA * 100;
      const page = DATA.pages[pageIdx];
      if (!page) return null;
      return { page, pageIdx, xpct, ypct };
    }

    // Hotspot de la página visible bajo el cursor (o null).
    // Devuelve { hs, pg } para poder dibujar el resaltado sobre esa página.
    function hotspotBajoCursor(){
      const pt = puntoEnLibro();
      if (!pt) return null;
      const pg = paginaBajoPunto(pt);
      if (!pg) return null;
      for (const hs of (pg.page.hotspots||[])){
        if (pg.xpct>=hs.x && pg.xpct<=hs.x+hs.w && pg.ypct>=hs.y && pg.ypct<=hs.y+hs.h) return { hs, pg };
      }
      return null;
    }

    /* ---------- resaltado de hotspot (cuadro iluminado al pasar el cursor) ----------
       Malla que copia la curvatura de la página en reposo, ligeramente por
       encima, con relleno translúcido y borde en el color de acento. */
    const hlMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(1,1),
      new THREE.MeshBasicMaterial({ color:0xe6c878, transparent:true, opacity:0.2, depthTest:false, side:THREE.DoubleSide })
    );
    hlMesh.renderOrder = 10; hlMesh.visible = false;
    const hlBorde = new THREE.LineSegments(
      new THREE.EdgesGeometry(hlMesh.geometry, 15),
      new THREE.LineBasicMaterial({ color:0xe6c878, transparent:true, opacity:0.9, depthTest:false })
    );
    hlBorde.renderOrder = 11; hlBorde.visible = false;
    libro.add(hlMesh); libro.add(hlBorde);
    let hlHs = null;

    function mostrarResaltado(pg, hs){
      if (hlHs === hs && hlMesh.visible) return;
      hlHs = hs;
      const derecha = (pg.pageIdx % 2 === 0);
      const x0 = (derecha ? hs.x/100 : hs.x/100 - 1) * ANCHO_PAGINA;
      const x1 = (derecha ? (hs.x+hs.w)/100 : (hs.x+hs.w)/100 - 1) * ANCHO_PAGINA;
      const yT = ALTO_PAGINA/2 - (hs.y/100)*ALTO_PAGINA;
      const yB = ALTO_PAGINA/2 - ((hs.y+hs.h)/100)*ALTO_PAGINA;
      const geo = new THREE.PlaneGeometry(x1-x0, yT-yB, 16, 1);
      geo.translate((x0+x1)/2, (yT+yB)/2, 0);
      // seguir el canal del lomo de la página en reposo
      const hoja = derecha ? hojas[volteadas] : hojas[volteadas-1];
      const canal = hoja ? hoja.factorCanal(derecha ? 0 : Math.PI) : 1;
      const p = geo.attributes.position;
      for (let i=0;i<p.count;i++){
        const t = Math.abs(p.getX(i)) / ANCHO_PAGINA;
        p.setZ(i, Hoja.zCanal(t)*canal + 0.02);
      }
      hlMesh.geometry.dispose(); hlMesh.geometry = geo;
      hlBorde.geometry.dispose(); hlBorde.geometry = new THREE.EdgesGeometry(geo, 15);
      hlMesh.visible = true; hlBorde.visible = true;
    }
    function ocultarResaltado(){
      hlMesh.visible = false; hlBorde.visible = false; hlHs = null;
    }

    // Activa un hotspot: enlace externo o reproductor/visor.
    function fireHotspot(hs){
      if (animando) return;
      if (hs.tipo==='enlace'){
        if (hs.src) window.open(hs.src, '_blank', 'noopener');
      } else {
        openMedia(hs);
      }
    }

    /* ============================================================
       INTERACCIÓN: pliegue de esquina (escritorio)
    ============================================================ */
    const FRAC_ESQUINA = 0.38;

    let arrastrando = false;
    let dirArrastre = 0;
    let hojaArrastre = null;
    let esquinaYArrastre = 1;
    let hojaPreview = null;

    // Detecta si el cursor está sobre la franja de una ESQUINA volteable.
    function esquinaBajoCursor(){
      const pt = puntoEnLibro();
      if (!pt) return null;
      const x = pt.x, y = pt.y;
      const halfH = ALTO_PAGINA/2;

      const lado = x >= 0 ? +1 : -1;
      const fx = Math.abs(x) / ANCHO_PAGINA;
      const fyTop = (y + halfH)/ALTO_PAGINA;
      const fyBot = (halfH - y)/ALTO_PAGINA;
      const esquinaY = fyTop > fyBot ? 1 : -1;
      const fyEsq = Math.max(fyTop, fyBot);

      if (fx <= (1 - FRAC_ESQUINA) || fyEsq <= (1 - FRAC_ESQUINA)) return null;

      let dir, h;
      if (lado > 0){ if (volteadas >= hojas.length) return null; dir=+1; h=hojas[volteadas]; }
      else         { if (volteadas <= 0)             return null; dir=-1; h=hojas[volteadas-1]; }

      const frac = Math.min(1, ((fx-(1-FRAC_ESQUINA)) + (fyEsq-(1-FRAC_ESQUINA))) / FRAC_ESQUINA);
      return { h, dir, esquinaY, frac, px:x, py:y };
    }

    let hojaDebajo = null;
    function mostrarDebajo(dir){
      ocultarDebajo();
      if (dir > 0 && hojas[volteadas+1]){
        hojaDebajo = hojas[volteadas+1];
        hojaDebajo.angulo = 0; hojaDebajo.deformar(0,0);
        hojaDebajo.grupo.position.z = -0.02; hojaDebajo.grupo.visible = true;
      } else if (dir < 0 && hojas[volteadas-2]){
        hojaDebajo = hojas[volteadas-2];
        hojaDebajo.angulo = Math.PI; hojaDebajo.deformar(Math.PI,0);
        hojaDebajo.grupo.position.z = -0.02; hojaDebajo.grupo.visible = true;
      }
    }
    function ocultarDebajo(){
      if (hojaDebajo){ hojaDebajo.grupo.visible = false; hojaDebajo.grupo.position.z = 0; hojaDebajo = null; }
    }

    let pliegue = null;
    let animDesdoble = null;

    function aplicarPliegue(h, esquinaY, ox, oy, alza){
      pliegue = { h, esquinaY, ox, oy, alza };
      h.grupo.position.z = 0.04;
      h.doblarEsquina(esquinaY, ox, oy, alza);
    }

    // Desdoble suave (~0.5s) al salir de la zona activa.
    let hojaDesdoblando = null;
    function desdoblarSuave(){
      if (!pliegue || animDesdoble) return;
      const p0 = { ...pliegue };
      pliegue = null;
      hojaDesdoblando = p0.h;
      const t0 = performance.now(); const dur = 500;
      function paso(now){
        const p = Math.min((now - t0)/dur, 1);
        const f = Math.pow(1-p, 3);
        p0.h.doblarEsquina(p0.esquinaY, p0.ox*f, p0.oy*f, p0.alza*f);
        if (p < 1) animDesdoble = requestAnimationFrame(paso);
        else {
          p0.h.plano(); p0.h.grupo.position.z = 0;
          hojaDesdoblando = null; animDesdoble = null;
          ocultarDebajo();
        }
      }
      animDesdoble = requestAnimationFrame(paso);
    }

    function cancelarDesdoble(){
      if (animDesdoble){ cancelAnimationFrame(animDesdoble); animDesdoble = null; }
      if (hojaDesdoblando){
        hojaDesdoblando.plano(); hojaDesdoblando.grupo.position.z = 0;
        hojaDesdoblando = null;
      }
    }

    function limpiarPreview(){ desdoblarSuave(); hojaPreview = null; }

    /* ---------- pan de cámara con zoom (escritorio) ---------- */
    let paneando=false, panSX=0, panSY=0, panBX=0, panBY=0, panMovio=false;

    canvas.addEventListener('mousemove', (ev)=>{
      actualizarNDC(ev.clientX, ev.clientY);
      if (paneando){
        // arrastre de cámara: la escena sigue al cursor
        const esc = (fitDist*zoomF) * Math.tan(camera.fov*Math.PI/360) * 2 / innerHeight;
        camPanX = panBX - (ev.clientX - panSX)*esc;
        camPanY = panBY + (ev.clientY - panSY)*esc;
        if (Math.abs(ev.clientX-panSX)+Math.abs(ev.clientY-panSY) > 4) panMovio=true;
        aplicarCamara();
        return;
      }
      if (arrastrando){
        const r = canvas.getBoundingClientRect();
        const fx = (ev.clientX - r.left) / r.width;
        let ang = (1 - fx) * Math.PI;
        ang = Math.max(0, Math.min(Math.PI, ang));
        aplicarAngulo(hojaArrastre, ang);
        return;
      }
      if (animando) return;
      // Hotspot bajo el cursor: prioridad sobre el pliegue de esquina.
      const hit = hotspotBajoCursor();
      if (hit){
        canvas.style.cursor = 'pointer';
        mostrarResaltado(hit.pg, hit.hs);
        limpiarPreview();
        return;
      }
      ocultarResaltado();
      const c = esquinaBajoCursor();
      if (c){
        cancelarDesdoble();
        canvas.style.cursor = 'grab';
        if (pliegue && pliegue.h !== c.h){
          pliegue.h.plano(); pliegue.h.grupo.position.z = 0;
          pliegue = null; ocultarDebajo();
        }
        hojaPreview = c.h;
        mostrarDebajo(c.dir);
        const lado = c.dir > 0 ? 1 : -1;
        const puntaX = lado * ANCHO_PAGINA;
        const puntaY = c.esquinaY * (ALTO_PAGINA/2);
        let ox = c.px - puntaX;
        let oy = c.py - puntaY;
        const dist = Math.hypot(ox, oy);
        const maxD = ANCHO_PAGINA * 1.9;
        if (dist > maxD){ ox *= maxD/dist; oy *= maxD/dist; }
        aplicarPliegue(c.h, c.esquinaY, ox, oy, 0.06);
      } else {
        canvas.style.cursor = zoomF<1 ? 'grab' : 'default';
        limpiarPreview();
      }
    });

    let downX = 0, downY = 0;
    canvas.addEventListener('mousedown', (ev)=>{
      downX = ev.clientX; downY = ev.clientY;
      if (animando) return;
      actualizarNDC(ev.clientX, ev.clientY);
      if (hotspotBajoCursor()) return;         // el click abrirá el hotspot
      const c = esquinaBajoCursor();
      if (!c){
        if (zoomF < 1){                        // con zoom: arrastrar = pan
          paneando = true; panMovio=false;
          panSX=ev.clientX; panSY=ev.clientY; panBX=camPanX; panBY=camPanY;
          canvas.style.cursor='grabbing';
        }
        return;
      }
      cancelarDesdoble();
      if (pliegue){ pliegue.h.plano(); pliegue.h.grupo.position.z = 0; pliegue = null; }
      hojaPreview = null; ocultarDebajo(); ocultarResaltado();
      arrastrando = true; animando = true;
      dirArrastre = c.dir; hojaArrastre = c.h; esquinaYArrastre = c.esquinaY;
      prepararVuelo(c.dir);
      canvas.style.cursor = 'grabbing';
      actualizarEstado();
    });

    window.addEventListener('mouseup', (ev)=>{
      if (paneando){ paneando=false; canvas.style.cursor = zoomF<1?'grab':'default'; return; }
      if (!arrastrando) return;
      arrastrando = false; canvas.style.cursor = 'default';
      // CLIC (casi sin movimiento) -> completar el volteo directamente.
      const fueClic = Math.hypot(ev.clientX - downX, ev.clientY - downY) < 8;
      let completar;
      if (fueClic){
        completar = true;
      } else {
        const ang = hojaArrastre.angulo;
        const pasoMitad = ang > Math.PI/2;
        completar = dirArrastre > 0 ? pasoMitad : !pasoMitad;
      }
      finalizarArrastre(completar);
    });

    function finalizarArrastre(completar){
      const h = hojaArrastre;
      const desde = h.angulo;
      let hasta;
      if (dirArrastre > 0) hasta = completar ? Math.PI : 0;
      else                 hasta = completar ? 0 : Math.PI;
      const t0 = performance.now(); const dur = 650;
      function paso(now){
        let p = Math.min((now - t0)/dur, 1);
        const e = 1 - Math.pow(1-p, 3);
        const ang = desde + (hasta - desde)*e;
        aplicarAngulo(h, ang);
        if (p < 1) requestAnimationFrame(paso);
        else {
          h.deformar(hasta, 0); h.angulo = hasta; h.grupo.position.z = 0;
          if (completar) volteadas += dirArrastre;
          reapilar(); animando = false; hojaArrastre = null;
          actualizarEstado();
        }
      }
      requestAnimationFrame(paso);
    }

    /* ---------- clic: hotspot o portada ---------- */
    canvas.addEventListener('click', (ev)=>{
      if (animando || arrastrando) return;
      if (panMovio){ panMovio=false; return; }
      if (Math.hypot(ev.clientX - downX, ev.clientY - downY) >= 8) return;
      actualizarNDC(ev.clientX, ev.clientY);
      const hit = hotspotBajoCursor();
      if (hit){ fireHotspot(hit.hs); return; }
      // clic sobre la portada cerrada: abrir la revista
      if (volteadas===0 && puntoEnLibro()) voltear(+1);
    });

    /* ---------- teclado ---------- */
    window.addEventListener('keydown', (ev)=>{
      if (animando) return;
      if (mediaOpen && isMobile) return;
      if (ev.key === 'ArrowRight') voltear(+1);
      else if (ev.key === 'ArrowLeft') voltear(-1);
    });

    /* ---------- rueda: zoom de la revista (escritorio) ---------- */
    canvas.addEventListener('wheel',(e)=>{
      if (mediaOpen) return;
      e.preventDefault();
      zoomF = Math.max(ZMIN, Math.min(1, zoomF + e.deltaY*0.0012));
      aplicarCamara();
      canvas.style.cursor = zoomF<1 ? 'grab' : 'default';
    },{passive:false});
    // doble clic alterna 100% / 200%
    canvas.addEventListener('dblclick',(e)=>{
      if (mediaOpen) return;
      zoomF = zoomF<1 ? 1 : 0.5;
      camPanX=0; camPanY=0; aplicarCamara();
    });

    /* ---------- táctil: tap para navegar, pinch para zoom ---------- */
    let tSX=0, tSY=0, tT=0, tMulti=false;
    let pinchStart=0, pinchBase=1;
    let tPan=false, tPanBX=0, tPanBY=0;
    canvas.addEventListener('touchstart',(e)=>{
      if (mediaOpen) return;
      if (e.touches.length>=2){
        tMulti=true; pinchStart=0;
        return;
      }
      tMulti=false;
      tSX=e.touches[0].clientX; tSY=e.touches[0].clientY; tT=Date.now();
      if (zoomF<1){ tPan=true; tPanBX=camPanX; tPanBY=camPanY; }
    },{passive:true});
    canvas.addEventListener('touchmove',(e)=>{
      if (mediaOpen) return;
      if (e.touches.length>=2){
        const dx=e.touches[0].clientX-e.touches[1].clientX;
        const dy=e.touches[0].clientY-e.touches[1].clientY;
        const dist=Math.hypot(dx,dy);
        if(!pinchStart){ pinchStart=dist; pinchBase=zoomF; return; }
        e.preventDefault();
        zoomF = Math.max(ZMIN, Math.min(1, pinchBase*(pinchStart/dist)));
        aplicarCamara();
      } else if (e.touches.length===1 && tPan){
        e.preventDefault();
        const esc = (fitDist*zoomF) * Math.tan(camera.fov*Math.PI/360) * 2 / innerHeight;
        camPanX = tPanBX - (e.touches[0].clientX - tSX)*esc;
        camPanY = tPanBY + (e.touches[0].clientY - tSY)*esc;
        aplicarCamara();
      }
    },{passive:false});
    canvas.addEventListener('touchend',(e)=>{
      if (e.touches.length<2) pinchStart=0;
      if (e.touches.length>0) return;
      tPan=false;
      if (tMulti){ tMulti=false; return; }
      if (suppressNextClick) return;    // este tap cerró el reproductor
      if (mediaOpen) return;
      if (animando) return;
      const t1=e.changedTouches[0];
      const moved=Math.hypot(t1.clientX-tSX, t1.clientY-tSY);
      if (moved>=25 || Date.now()-tT>=600) return;
      actualizarNDC(t1.clientX, t1.clientY);
      // evita los eventos de mouse sintéticos del tap (doble disparo)
      if (e.cancelable) e.preventDefault();
      // prioridad: hotspot bajo el dedo
      const hit = hotspotBajoCursor();
      if (hit){ fireHotspot(hit.hs); return; }
      if (zoomF<1) return;              // con zoom, el toque es para pan
      // mitad izquierda = anterior, mitad derecha = siguiente
      if (t1.clientX > window.innerWidth/2) voltear(+1);
      else voltear(-1);
    });

    /* =========================================================
       REPRODUCTOR audio/video
    ========================================================= */
    const player=document.getElementById('player');
    const playerArt=document.getElementById('playerArt');
    const playerTitle=document.getElementById('playerTitle');
    const playerSub=document.getElementById('playerSub');
    const seek=document.getElementById('seek');
    const seekFill=document.getElementById('seekFill');
    const timeCur=document.getElementById('timeCur');
    const timeDur=document.getElementById('timeDur');
    let currentMedia=null, seeking=false;

    function fmt(s){ if(!isFinite(s))return '0:00'; s=Math.floor(s); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }

    function openMedia(hs){
      if(hs.tipo==='imagen'){ openImage(hs); return; }
      playerArt.innerHTML='';
      player.classList.remove('video');
      let media;
      if(hs.tipo==='video'){
        player.classList.add('video');
        media=document.createElement('video'); media.src=hs.src; media.playsInline=true;
        playerArt.appendChild(media);
        media.addEventListener('loadedmetadata',()=>{
          if(media.videoWidth && media.videoHeight){
            playerArt.style.aspectRatio = media.videoWidth + ' / ' + media.videoHeight;
          }
        });
      } else {
        playerArt.style.aspectRatio='';
        const img=document.createElement('img'); img.src=DATA.audioCover; img.onerror=()=>{img.style.display='none';playerArt.style.background='radial-gradient(circle,#2aa3ef,#0d2a47)';};
        media=document.createElement('audio'); media.src=hs.src;
        playerArt.appendChild(img); playerArt.appendChild(media);
      }
      currentMedia=media;
      playerTitle.textContent=hs.titulo||(hs.tipo==='video'?'Video':'Audio');
      playerSub.textContent=hs.subtitulo||'';
      const vol0=getSavedVolume();
      document.getElementById('vol').value=vol0; media.volume=vol0;
      seek.value=0; seekFill.style.width='0%'; timeCur.textContent='0:00'; timeDur.textContent='-0:00';
      media.addEventListener('loadedmetadata',()=>{ if(media!==currentMedia)return; timeDur.textContent='-'+fmt(media.duration); });
      media.addEventListener('timeupdate',()=>{
        if(media!==currentMedia)return;
        if(seeking){ slog('timeupdate IGNORADO (seeking) ct='+media.currentTime.toFixed(1)); return; }
        const d=media.duration||0, pct=d?media.currentTime/d*100:0;
        seek.value=pct; seekFill.style.width=pct+'%';
        timeCur.textContent=fmt(media.currentTime);
        timeDur.textContent='-'+fmt(d-media.currentTime);
      });
      media.addEventListener('seeking',()=>{ slog('EVT seeking ct='+media.currentTime.toFixed(1)); });
      media.addEventListener('seeked',()=>{ if(media!==currentMedia)return; slog('EVT seeked ct='+media.currentTime.toFixed(1)); seeking=false; });
      centerWin(player); player.classList.add('open'); mediaOpen=true;
      media.play().catch(()=>{});
    }
    seek.oninput=()=>{ if(!currentMedia)return; seeking=true; const d=currentMedia.duration||0; seekFill.style.width=seek.value+'%'; timeCur.textContent=fmt(d*seek.value/100); };
    function commitSeek(){
      if(currentMedia){
        const d=currentMedia.duration||0;
        if(d){ seeking=true; const target=d*seek.value/100; slog('commit -> set ct='+target.toFixed(1)+' val='+seek.value); currentMedia.currentTime=target; }
        else seeking=false;
      } else seeking=false;
    }
    seek.onchange=commitSeek;
    seek.addEventListener('touchend',(e)=>{ e.stopPropagation(); commitSeek(); },true);
    seek.addEventListener('pointerup',commitSeek);
    document.getElementById('btnPlay').onclick=()=>currentMedia&&currentMedia.play();
    document.getElementById('btnPause').onclick=()=>currentMedia&&currentMedia.pause();
    document.getElementById('btnStop').onclick=()=>{ if(currentMedia){currentMedia.pause();currentMedia.currentTime=0;} };
    document.getElementById('vol').oninput=(e)=>{ if(currentMedia)currentMedia.volume=e.target.value; saveVolume(e.target.value); };

    // Volumen persistente entre reproductores y entre sesiones (localStorage).
    function getSavedVolume(){
      try{ const v=parseFloat(localStorage.getItem('portafolioVolumen')); return (isFinite(v)&&v>=0&&v<=1)?v:1; }
      catch(e){ return 1; }
    }
    function saveVolume(v){
      try{ localStorage.setItem('portafolioVolumen', String(v)); }catch(e){}
    }

    /* =========================================================
       VISOR de imagen
    ========================================================= */
    const viewer=document.getElementById('viewer');
    const imgEl=document.getElementById('imgEl');
    const viewerTitle=document.getElementById('viewerTitle');
    const viewerSub=document.getElementById('viewerSub');
    const zoomLabel=document.getElementById('zoomLabel');
    let zoom=1, ix=0, iy=0;
    function openImage(hs){
      imgEl.src=hs.src; zoom=1; ix=0; iy=0; applyZoom();
      viewerTitle.textContent=hs.titulo||'Imagen';
      viewerSub.textContent=hs.subtitulo||'';
      centerWin(viewer); viewer.classList.add('open'); mediaOpen=true;
    }
    function clampImg(){
      const canvasI=imgEl.parentElement;
      const cw=canvasI.clientWidth, ch=canvasI.clientHeight;
      const maxX=Math.max(0,(imgEl.offsetWidth*zoom - cw)/2);
      const maxY=Math.max(0,(imgEl.offsetHeight*zoom - ch)/2);
      ix=Math.max(-maxX,Math.min(maxX,ix));
      iy=Math.max(-maxY,Math.min(maxY,iy));
    }
    function applyZoom(){
      if(zoom<=1){ ix=0; iy=0; } else { clampImg(); }
      imgEl.style.transform='translate('+ix+'px,'+iy+'px) scale('+zoom+')';
      imgEl.style.cursor = zoom>1 ? 'grab' : 'default';
      zoomLabel.textContent=Math.round(zoom*100)+'%';
    }
    document.getElementById('zoomIn').onclick=()=>{ zoom=Math.min(zoom+0.25,5); applyZoom(); };
    document.getElementById('zoomOut').onclick=()=>{ zoom=Math.max(zoom-0.25,0.25); applyZoom(); };
    document.getElementById('zoomReset').onclick=()=>{ zoom=1; ix=0; iy=0; applyZoom(); };

    // PAN con mouse (escritorio)
    let ipanning=false, ipsx=0, ipsy=0, ipix=0, ipiy=0;
    imgEl.addEventListener('mousedown',(e)=>{
      if(zoom<=1) return;
      e.preventDefault(); ipanning=true; imgEl.style.cursor='grabbing';
      ipsx=e.clientX; ipsy=e.clientY; ipix=ix; ipiy=iy;
    });
    document.addEventListener('mousemove',(e)=>{
      if(!ipanning) return;
      ix=ipix+(e.clientX-ipsx); iy=ipiy+(e.clientY-ipsy); clampImg();
      imgEl.style.transform='translate('+ix+'px,'+iy+'px) scale('+zoom+')';
    });
    document.addEventListener('mouseup',()=>{ if(ipanning){ ipanning=false; imgEl.style.cursor='grab'; } });
    // PAN con un dedo (móvil)
    imgEl.addEventListener('touchstart',(e)=>{
      if(zoom<=1||e.touches.length!==1) return;
      ipanning=true; ipsx=e.touches[0].clientX; ipsy=e.touches[0].clientY; ipix=ix; ipiy=iy;
    },{passive:true});
    imgEl.addEventListener('touchmove',(e)=>{
      if(!ipanning||e.touches.length!==1) return;
      e.preventDefault();
      ix=ipix+(e.touches[0].clientX-ipsx); iy=ipiy+(e.touches[0].clientY-ipsy); clampImg();
      imgEl.style.transform='translate('+ix+'px,'+iy+'px) scale('+zoom+')';
    },{passive:false});
    imgEl.addEventListener('touchend',()=>{ ipanning=false; });
    // rueda del ratón sobre la imagen = zoom (escritorio)
    imgEl.parentElement.addEventListener('wheel',(e)=>{
      e.preventDefault();
      zoom=Math.max(0.25,Math.min(5, zoom - e.deltaY*0.002));
      applyZoom();
    },{passive:false});

    /* ---- cerrar ---- */
    function closeWindow(id){
      const w=document.getElementById(id);
      if(!w||!w.classList.contains('open')) return;
      w.classList.remove('open');
      mediaOpen=false;
      if(id==='player'&&currentMedia){ currentMedia.pause(); currentMedia=null; playerArt.innerHTML=''; }
    }
    document.querySelectorAll('[data-close]').forEach(b=>{
      b.onclick=()=>{ closeWindow(b.dataset.close); };
    });

    /* ---- cerrar al hacer clic/tap FUERA del reproductor abierto ---- */
    let suppressNextClick=false;
    function outsideCloser(ev){
      if(!mediaOpen) return;
      const openWin=document.querySelector('.ipod.open');
      if(!openWin) return;
      if(openWin.contains(ev.target)) return;
      ev.stopPropagation();
      ev.preventDefault();
      suppressNextClick=true;
      closeWindow(openWin.id);
    }
    document.addEventListener('mousedown', outsideCloser, true);
    document.addEventListener('touchstart', outsideCloser, {capture:true, passive:false});
    document.addEventListener('click',(ev)=>{
      if(suppressNextClick){ ev.stopPropagation(); ev.preventDefault(); setTimeout(()=>{suppressNextClick=false;},0); }
    }, true);
    document.addEventListener('touchend',(ev)=>{
      if(suppressNextClick){ ev.stopPropagation(); setTimeout(()=>{suppressNextClick=false;},0); }
    }, true);

    /* ---- centrar y arrastrar ventanas ---- */
    function centerWin(w){
      if(isMobile) return;
      w.style.left=(window.innerWidth/2-220)+'px'; w.style.top=(window.innerHeight/2-200)+'px';
    }
    function dragify(win,bar){
      if(isMobile) return;
      let dx=0,dy=0,down=false;
      bar.addEventListener('mousedown',e=>{ if(e.target.closest('.closex'))return; down=true; dx=e.clientX-win.offsetLeft; dy=e.clientY-win.offsetTop; });
      document.addEventListener('mousemove',e=>{ if(down){ win.style.left=(e.clientX-dx)+'px'; win.style.top=(e.clientY-dy)+'px'; } });
      document.addEventListener('mouseup',()=>down=false);
    }
    dragify(player,document.getElementById('playerBar'));
    dragify(viewer,document.getElementById('viewerBar'));

    /* ---------- bucle de render ---------- */
    function animar(){
      libro.position.x += (offsetObjetivo - libro.position.x) * 0.08;
      // pulso suave del resaltado de hotspot
      if (hlMesh.visible){
        hlMesh.material.opacity = 0.16 + 0.08 * (0.5 + 0.5*Math.sin(performance.now()/280));
      }
      renderer.render(scene,camera);
      requestAnimationFrame(animar);
    }

    construir();

    // Ganchos mínimos para pruebas automatizadas (?test=1)
    if(location.search.indexOf('test=1')>=0){
      window.__rev = {
        get volteadas(){ return volteadas; },
        get hojas(){ return hojas.length; },
        get mediaOpen(){ return mediaOpen; },
        get resaltado(){ return hlMesh.visible; },
        voltear,
        worldToScreen(x,y){
          const v=new THREE.Vector3(x + libro.position.x, y, 0).project(camera);
          return { x:(v.x*0.5+0.5)*innerWidth, y:(-v.y*0.5+0.5)*innerHeight };
        },
        pagePointToScreen(pageIdx, xpct, ypct){
          // pageIdx debe ser una de las dos páginas visibles del pliego actual
          const derecha = (pageIdx % 2 === 0);
          const lx = (derecha ? xpct/100 : xpct/100 - 1) * ANCHO_PAGINA;
          const ly = ALTO_PAGINA/2 - (ypct/100)*ALTO_PAGINA;
          return this.worldToScreen(lx, ly);
        }
      };
    }

   } catch(err){ var b=document.getElementById('errbox'); b.style.display='block'; b.textContent='⚠ '+(err&&err.message?err.message:err); }
  }

  window.addEventListener('load', boot);

  // Recargar si se cruza el umbral móvil/escritorio (ej. rotar el teléfono)
  let wasMobile = window.matchMedia('(max-width: 820px)').matches;
  let rT;
  window.addEventListener('resize', ()=>{
    clearTimeout(rT);
    rT = setTimeout(()=>{
      const nowMobile = window.matchMedia('(max-width: 820px)').matches;
      if(nowMobile !== wasMobile){ wasMobile = nowMobile; location.reload(); }
    }, 350);
  });
  </script>
</body>
</html>
