<!DOCTYPE html>
<!--
  EDITOR DEL PORTAFOLIO  ·  uso LOCAL (Live Server)
  - Gestiona páginas, hotspots, carátula de audio.
  - Guarda/carga portafolio.json (tus versiones).
  - "Vista previa" abre el index.html con los cambios actuales.
  Las imágenes/medios se referencian por RUTA (tú colocas los archivos en /pages y /media).
-->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor · Portafolio Revista</title>
<style>
  :root{ --bg:#1a1a22; --panel:#23232e; --line:#34343f; --accent:#e6c878; --blue:#2aa3ef; --txt:#e8e8ee; --mut:#9a9aa8; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{ background:var(--bg); color:var(--txt); font-family:system-ui,sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  header{
    display:flex; align-items:center; gap:12px; padding:10px 16px;
    background:var(--panel); border-bottom:1px solid var(--line);
  }
  header h1{ font-size:15px; font-weight:700; color:var(--accent); margin-right:auto; }
  header button{
    background:#2f2f3b; color:var(--txt); border:1px solid var(--line);
    padding:7px 13px; border-radius:6px; cursor:pointer; font-size:13px;
  }
  header button:hover{ background:#3a3a48; }
  header button.primary{ background:var(--blue); border-color:var(--blue); color:#fff; }
  header button.accent{ background:var(--accent); border-color:var(--accent); color:#222; font-weight:600; }

  main{ flex:1; display:grid; grid-template-columns:230px 1fr 300px; overflow:hidden; }

  /* columna izquierda: lista de páginas */
  .pages{ background:var(--panel); border-right:1px solid var(--line); overflow-y:auto; padding:10px; }
  .pages h2,.props h2{ font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--mut); margin:6px 4px 10px; }
  .pageitem{
    display:flex; align-items:center; gap:8px; padding:8px; margin-bottom:6px;
    background:#2b2b36; border:1px solid var(--line); border-radius:6px; cursor:pointer; font-size:13px;
  }
  .pageitem.sel{ border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
  .pageitem .thumb{ width:32px; height:45px; object-fit:cover; border-radius:3px; background:#000; flex:none; }
  .pageitem .nm{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .pageitem .tag{ font-size:10px; color:var(--accent); }
  .pageitem .handle{ cursor:grab; color:var(--mut); }
  .pages .addbtn{ width:100%; padding:9px; background:#2f2f3b; border:1px dashed var(--line); color:var(--accent); border-radius:6px; cursor:pointer; font-size:13px; }

  /* centro: lienzo de la página */
  .canvaswrap{ display:flex; align-items:center; justify-content:center; overflow:auto; padding:20px; position:relative; }
  .canvas{
    position:relative; background:#000; box-shadow:0 10px 40px rgba(0,0,0,.5);
    /* proporción A4 fijada por JS */
  }
  .canvas img.bg{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; user-select:none; pointer-events:none; }
  .canvas .noimg{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#666; font-size:13px; text-align:center; padding:20px; }
  .hs{
    position:absolute; border:2px solid var(--accent); background:rgba(230,200,120,.18);
    cursor:move; font-size:11px; color:#fff;
  }
  .hs.sel{ border-color:var(--blue); background:rgba(42,163,239,.22); box-shadow:0 0 0 1px var(--blue); }
  .hs .lbl{ position:absolute; top:2px; left:4px; background:rgba(0,0,0,.6); padding:1px 5px; border-radius:3px; pointer-events:none; }
  .hs .rz{ position:absolute; right:-6px; bottom:-6px; width:12px; height:12px; background:var(--blue); border:1px solid #fff; border-radius:2px; cursor:nwse-resize; }
  .hint{ position:absolute; top:10px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,.6); padding:5px 12px; border-radius:20px; font-size:12px; color:var(--mut); }

  /* derecha: propiedades */
  .props{ background:var(--panel); border-left:1px solid var(--line); overflow-y:auto; padding:12px; }
  .field{ margin-bottom:12px; }
  .field label{ display:block; font-size:11px; color:var(--mut); margin-bottom:4px; text-transform:uppercase; letter-spacing:.5px; }
  .field input, .field select{
    width:100%; padding:7px 9px; background:#1c1c25; border:1px solid var(--line);
    color:var(--txt); border-radius:5px; font-size:13px;
  }
  .field input:focus,.field select:focus{ outline:none; border-color:var(--accent); }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .props .sectitle{ font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--accent); margin:14px 0 8px; border-top:1px solid var(--line); padding-top:12px; }
  .smallbtn{ background:#2f2f3b; color:var(--txt); border:1px solid var(--line); padding:6px 10px; border-radius:5px; cursor:pointer; font-size:12px; margin-right:6px; }
  .smallbtn:hover{ background:#3a3a48; }
  .smallbtn.danger{ color:#f88; border-color:#5a2a2a; }
  .empty{ color:var(--mut); font-size:13px; text-align:center; padding:30px 10px; }
  .addhs{ width:100%; padding:9px; background:var(--blue); border:none; color:#fff; border-radius:6px; cursor:pointer; font-size:13px; margin-top:6px; }
</style>
</head>
<body>
  <header>
    <h1>✦ Editor · Revista</h1>
    <button onclick="loadJSON()">📂 Cargar JSON</button>
    <button onclick="saveJSON()">💾 Guardar JSON</button>
    <button class="primary" onclick="preview()">👁 Vista previa</button>
    <input type="file" id="fileInput" accept=".json" style="display:none">
  </header>

  <main>
    <!-- PÁGINAS -->
    <div class="pages">
      <h2>Páginas</h2>
      <div id="pageList"></div>
      <button class="addbtn" onclick="addPage()">＋ Añadir página</button>
      <div class="sectitle" style="margin-top:18px"></div>
      <h2>Carátula de audio</h2>
      <div class="field">
        <input id="audioCover" type="text" placeholder="media/audio_cover.jpg" oninput="state.audioCover=this.value">
      </div>
      <h2 style="margin-top:16px">Fondo de la revista</h2>
      <div class="field">
        <label>Tipo</label>
        <select id="bgTipo" onchange="setBgTipo(this.value)">
          <option value="">(por defecto)</option>
          <option value="color">Color</option>
          <option value="imagen">Imagen</option>
        </select>
      </div>
      <div class="field" id="bgValorWrap" style="display:none">
        <label id="bgValorLabel">Valor</label>
        <input id="bgValor" type="text" oninput="setBgValor(this.value)">
      </div>
    </div>

    <!-- LIENZO -->
    <div class="canvaswrap">
      <div class="canvas" id="canvas">
        <div class="noimg" id="noimg">Selecciona o añade una página</div>
      </div>
      <div class="hint" id="hint" style="display:none">Arrastra sobre la página para dibujar un hotspot</div>
    </div>

    <!-- PROPIEDADES -->
    <div class="props">
      <h2>Propiedades</h2>
      <div id="pageProps"></div>
      <div id="hsProps"></div>
    </div>
  </main>

<script>
window.onerror=function(m,s,l,c,e){
  var b=document.createElement('div');
  b.style.cssText='position:fixed;top:0;left:0;right:0;background:#7a1a1a;color:#fff;font-family:monospace;font-size:12px;padding:8px 12px;z-index:99999;white-space:pre-wrap';
  b.textContent='⚠ '+m+'  ('+s+' L'+l+':'+c+')';
  document.body.appendChild(b);
  return false;
};
</script>
<script>
/* =========================================================
   ESTADO
========================================================= */
let state = {
  audioCover: "media/audio_cover.jpg",
  pages: []
};
let selPage = -1;   // índice de página seleccionada
let selHs = -1;     // índice de hotspot seleccionado
const RATIO = 1.414;

/* arranque: intenta cargar portafolio.json existente */
fetch('portafolio.json',{cache:'no-store'})
  .then(r=>r.ok?r.json():null)
  .then(j=>{ if(j){ state=j; if(!state.pages)state.pages=[]; } selPage = state.pages.length?0:-1; render(); })
  .catch(()=>{ render(); });

/* =========================================================
   RENDER GENERAL
========================================================= */
function render(){
  document.getElementById('audioCover').value = state.audioCover||'';
  // fondo
  const bg = state.background || {tipo:'',valor:''};
  document.getElementById('bgTipo').value = bg.tipo||'';
  syncBgUI(bg.tipo||'');
  document.getElementById('bgValor').value = bg.valor||'';
  renderPageList();
  renderCanvas();
  renderProps();
}
function syncBgUI(tipo){
  const wrap=document.getElementById('bgValorWrap');
  const lbl=document.getElementById('bgValorLabel');
  const inp=document.getElementById('bgValor');
  if(tipo===''){ wrap.style.display='none'; return; }
  wrap.style.display='';
  if(tipo==='color'){ lbl.textContent='Color (ej. #222 o #1a1a2e)'; inp.placeholder='#1a1a2e'; }
  else { lbl.textContent='Ruta de imagen (ej. media/fondo.jpg)'; inp.placeholder='media/fondo.jpg'; }
}
function setBgTipo(tipo){
  if(!state.background) state.background={tipo:'',valor:''};
  state.background.tipo=tipo;
  if(tipo==='') state.background={};
  syncBgUI(tipo);
}
function setBgValor(v){
  if(!state.background) state.background={tipo:'color',valor:''};
  state.background.valor=v;
}

function renderPageList(){
  const list = document.getElementById('pageList');
  list.innerHTML='';
  state.pages.forEach((p,i)=>{
    const el=document.createElement('div');
    el.className='pageitem'+(i===selPage?' sel':'');
    el.draggable=true;
    const tag = p.hard ? (i===0?'<span class="tag">portada</span>':'<span class="tag">contra</span>') : '';
    el.innerHTML =
      '<span class="handle">⋮⋮</span>'+
      '<img class="thumb" src="'+(p.src||'')+'" onerror="this.style.opacity=.2">'+
      '<span class="nm">'+(p.src? p.src.split("/").pop() : '(sin imagen)')+'</span>'+ tag;
    el.onclick=()=>{ selPage=i; selHs=-1; render(); };
    // drag para reordenar
    el.addEventListener('dragstart',e=>{ e.dataTransfer.setData('text/plain',i); });
    el.addEventListener('dragover',e=>e.preventDefault());
    el.addEventListener('drop',e=>{
      e.preventDefault();
      const from=+e.dataTransfer.getData('text/plain');
      movePage(from,i);
    });
    list.appendChild(el);
  });
}

function renderCanvas(){
  const c=document.getElementById('canvas');
  // fijar tamaño A4 segun alto disponible
  const wrap=c.parentElement;
  const h=Math.min(wrap.clientHeight-40, 680);
  const w=Math.round(h/RATIO);
  c.style.width=w+'px'; c.style.height=h+'px';

  c.innerHTML='';
  if(selPage<0 || !state.pages[selPage]){
    c.innerHTML='<div class="noimg">Selecciona o añade una página</div>';
    document.getElementById('hint').style.display='none';
    return;
  }
  document.getElementById('hint').style.display='block';
  const p=state.pages[selPage];
  if(p.src){
    const img=document.createElement('img'); img.className='bg'; img.src=p.src;
    img.onerror=()=>{ img.replaceWith(Object.assign(document.createElement('div'),{className:'noimg',textContent:'No se encontró: '+p.src})); };
    c.appendChild(img);
  } else {
    c.insertAdjacentHTML('beforeend','<div class="noimg">Esta página no tiene imagen.<br>Escribe su ruta en Propiedades →</div>');
  }
  (p.hotspots||[]).forEach((hs,i)=>{
    const d=document.createElement('div');
    d.className='hs'+(i===selHs?' sel':'');
    d.style.left=hs.x+'%'; d.style.top=hs.y+'%'; d.style.width=hs.w+'%'; d.style.height=hs.h+'%';
    const ic = hs.tipo==='video'?'▶':hs.tipo==='audio'?'♪':'🖼';
    d.innerHTML='<span class="lbl">'+ic+' '+(hs.titulo||hs.tipo)+'</span><div class="rz"></div>';
    enableDragResize(d,hs,i);
    c.appendChild(d);
  });
  enableDrawNew(c);
}

/* =========================================================
   DIBUJAR / MOVER / REDIMENSIONAR HOTSPOTS
========================================================= */
function enableDrawNew(c){
  c.onmousedown=(e)=>{
    // si el mousedown ocurre dentro de un hotspot (o su label/resize), NO dibujar
    if(e.target.closest('.hs')) return;
    if(e.target!==c && !e.target.classList.contains('bg') && !e.target.classList.contains('noimg')) return;
    if(selPage<0) return;
    const r=c.getBoundingClientRect();
    const x0=(e.clientX-r.left)/r.width*100, y0=(e.clientY-r.top)/r.height*100;
    const ghost=document.createElement('div'); ghost.className='hs sel'; c.appendChild(ghost);
    function mm(ev){
      const x1=(ev.clientX-r.left)/r.width*100, y1=(ev.clientY-r.top)/r.height*100;
      const x=Math.min(x0,x1),y=Math.min(y0,y1),w=Math.abs(x1-x0),h=Math.abs(y1-y0);
      ghost.style.left=x+'%';ghost.style.top=y+'%';ghost.style.width=w+'%';ghost.style.height=h+'%';
    }
    function mu(ev){
      document.removeEventListener('mousemove',mm); document.removeEventListener('mouseup',mu);
      const x1=(ev.clientX-r.left)/r.width*100, y1=(ev.clientY-r.top)/r.height*100;
      const x=Math.min(x0,x1),y=Math.min(y0,y1),w=Math.abs(x1-x0),h=Math.abs(y1-y0);
      ghost.remove();
      if(w<2||h<2) return;   // demasiado pequeño = clic accidental
      if(!state.pages[selPage].hotspots) state.pages[selPage].hotspots=[];
      state.pages[selPage].hotspots.push({ tipo:'video', src:'', x:+x.toFixed(1),y:+y.toFixed(1),w:+w.toFixed(1),h:+h.toFixed(1), titulo:'', subtitulo:'' });
      selHs=state.pages[selPage].hotspots.length-1;
      render();
    }
    document.addEventListener('mousemove',mm); document.addEventListener('mouseup',mu);
  };
}

function selectHsLight(idx){
  // marca selección sin recrear el DOM (para no romper un arrastre en curso)
  selHs=idx;
  document.querySelectorAll('#canvas .hs').forEach((el,i)=>el.classList.toggle('sel', i===idx));
  renderProps();
}

function enableDragResize(d,hs,idx){
  // MOVER (y seleccionar al tocar)
  d.onmousedown=(e)=>{
    if(e.target.classList.contains('rz')) return; // resize aparte
    e.stopPropagation(); e.preventDefault();
    if(selHs!==idx) selectHsLight(idx);
    const c=document.getElementById('canvas');
    const r=c.getBoundingClientRect();
    const sx=e.clientX, sy=e.clientY, ox=hs.x, oy=hs.y;
    let moved=false;
    function mm(ev){
      moved=true;
      hs.x=Math.max(0,Math.min(100-hs.w, ox+(ev.clientX-sx)/r.width*100));
      hs.y=Math.max(0,Math.min(100-hs.h, oy+(ev.clientY-sy)/r.height*100));
      d.style.left=hs.x+'%'; d.style.top=hs.y+'%';
    }
    function mu(){ document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu); if(moved) renderProps(); }
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  };
  // REDIMENSIONAR
  const rz=d.querySelector('.rz');
  rz.onmousedown=(e)=>{
    e.stopPropagation(); e.preventDefault();
    if(selHs!==idx) selectHsLight(idx);
    const c=document.getElementById('canvas');
    const r=c.getBoundingClientRect();
    const sx=e.clientX, sy=e.clientY, ow=hs.w, oh=hs.h;
    function mm(ev){
      hs.w=Math.max(2,Math.min(100-hs.x, ow+(ev.clientX-sx)/r.width*100));
      hs.h=Math.max(2,Math.min(100-hs.y, oh+(ev.clientY-sy)/r.height*100));
      d.style.width=hs.w+'%'; d.style.height=hs.h+'%';
    }
    function mu(){ document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu); renderProps(); }
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  };
}

/* =========================================================
   PROPIEDADES (página + hotspot)
========================================================= */
function renderProps(){
  const pp=document.getElementById('pageProps');
  const hp=document.getElementById('hsProps');
  pp.innerHTML=''; hp.innerHTML='';
  if(selPage<0){ pp.innerHTML='<div class="empty">No hay página seleccionada.</div>'; return; }
  const p=state.pages[selPage];

  pp.innerHTML =
    '<div class="field"><label>Imagen de la página (ruta)</label>'+
      '<input type="text" value="'+(p.src||'')+'" placeholder="pages/p2.jpg" oninput="setPageSrc(this.value)"></div>'+
    '<div class="field"><label><input type="checkbox" '+(p.hard?'checked':'')+' onchange="setHard(this.checked)" style="width:auto;margin-right:6px">Hoja rígida (portada/contraportada)</label></div>'+
    '<div><button class="smallbtn danger" onclick="deletePage()">🗑 Eliminar página</button></div>';

  if(selHs<0 || !p.hotspots || !p.hotspots[selHs]){
    hp.innerHTML='<div class="sectitle">Hotspot</div><div class="empty">Dibuja un hotspot sobre la página, o selecciona uno existente.</div>';
    return;
  }
  const hs=p.hotspots[selHs];
  hp.innerHTML =
    '<div class="sectitle">Hotspot seleccionado</div>'+
    '<div class="field"><label>Tipo</label><select onchange="setHs(\'tipo\',this.value)">'+
      ['video','audio','imagen','enlace'].map(t=>'<option value="'+t+'" '+(hs.tipo===t?'selected':'')+'>'+t+'</option>').join('')+
    '</select></div>'+
    '<div class="field"><label>'+(hs.tipo==='enlace'?'URL del enlace':'Ruta del medio')+'</label><input type="text" value="'+(hs.src||'')+'" placeholder="'+(hs.tipo==='enlace'?'https://...':'media/clip.mp4')+'" oninput="setHs(\'src\',this.value)"></div>'+
    '<div class="field"><label>Título</label><input type="text" value="'+(hs.titulo||'')+'" oninput="setHs(\'titulo\',this.value)"></div>'+
    '<div class="field"><label>Subtítulo</label><input type="text" value="'+(hs.subtitulo||'')+'" oninput="setHs(\'subtitulo\',this.value)"></div>'+
    '<div class="row2">'+
      '<div class="field"><label>X %</label><input type="number" value="'+hs.x+'" oninput="setHsNum(\'x\',this.value)"></div>'+
      '<div class="field"><label>Y %</label><input type="number" value="'+hs.y+'" oninput="setHsNum(\'y\',this.value)"></div>'+
      '<div class="field"><label>Ancho %</label><input type="number" value="'+hs.w+'" oninput="setHsNum(\'w\',this.value)"></div>'+
      '<div class="field"><label>Alto %</label><input type="number" value="'+hs.h+'" oninput="setHsNum(\'h\',this.value)"></div>'+
    '</div>'+
    '<div><button class="smallbtn danger" onclick="deleteHs()">🗑 Eliminar hotspot</button></div>';
}

/* ---- setters ---- */
function setPageSrc(v){ state.pages[selPage].src=v; renderPageList(); renderCanvas(); }
function setHard(v){ state.pages[selPage].hard=v; renderPageList(); }
function setHs(k,v){ state.pages[selPage].hotspots[selHs][k]=v; renderCanvas(); }
function setHsNum(k,v){ state.pages[selPage].hotspots[selHs][k]=parseFloat(v)||0; renderCanvas(); }

/* =========================================================
   ACCIONES PÁGINA
========================================================= */
function addPage(){
  state.pages.push({ src:'', hotspots:[] });
  selPage=state.pages.length-1; selHs=-1; render();
}
function deletePage(){
  if(!confirm('¿Eliminar esta página?'))return;
  state.pages.splice(selPage,1);
  selPage=Math.min(selPage,state.pages.length-1); selHs=-1; render();
}
function movePage(from,to){
  if(from===to)return;
  const [m]=state.pages.splice(from,1);
  state.pages.splice(to,0,m);
  selPage=to; render();
}
function deleteHs(){
  state.pages[selPage].hotspots.splice(selHs,1); selHs=-1; render();
}

/* =========================================================
   GUARDAR / CARGAR / VISTA PREVIA
========================================================= */
function saveJSON(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='portafolio.json';
  a.click();
  alert('Se descargó portafolio.json.\nReemplaza el archivo en la carpeta del proyecto para que el visor lo use.');
}
function loadJSON(){
  document.getElementById('fileInput').click();
}
(function(){
  var fi=document.getElementById('fileInput');
  if(fi) fi.addEventListener('change',function(e){
    const f=e.target.files[0]; if(!f)return;
    const rd=new FileReader();
    rd.onload=()=>{ try{ state=JSON.parse(rd.result); if(!state.pages)state.pages=[]; selPage=state.pages.length?0:-1; selHs=-1; render(); }catch(err){ alert('JSON inválido: '+err.message); } };
    rd.readAsText(f);
  });
})();
function preview(){
  sessionStorage.setItem('previewData', JSON.stringify(state));
  window.open('index.html?preview=1','_blank');
}

/* Exponer funciones usadas desde atributos onclick/oninput del HTML
   (garantiza que existan en window, sin importar el contexto del script). */
Object.assign(window, {
  render, renderProps, addPage, deletePage, movePage, deleteHs,
  setPageSrc, setHard, setHs, setHsNum, selectHsLight,
  saveJSON, loadJSON, preview,
  setBgTipo, setBgValor, syncBgUI
});
</script>
</body>
</html>
